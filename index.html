<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>属性测试</title>

<style>
  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif;
    background: #f2f2f7;
    display: flex;
    justify-content: center;
    align-items: center;
    height: 100vh;
  }

  .container {
    width: 100%;
    max-width: 420px;
    padding: 20px;
  }

  .card {
    background: rgba(255,255,255,0.75);
    backdrop-filter: blur(20px);
    border-radius: 20px;
    padding: 25px;
    box-shadow: 0 10px 30px rgba(0,0,0,0.08);
  }

  h2 {
    font-size: 20px;
    font-weight: 600;
    margin-bottom: 20px;
  }

  button {
    width: 100%;
    padding: 14px;
    margin: 8px 0;
    border: none;
    border-radius: 14px;
    background: #007AFF;
    color: white;
    font-size: 16px;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s ease;
  }

  button:active {
    transform: scale(0.97);
    opacity: 0.85;
  }

  .secondary {
    background: #e5e5ea;
    color: black;
  }

  .progress {
    height: 4px;
    background: #e5e5ea;
    border-radius: 10px;
    margin-bottom: 20px;
    overflow: hidden;
  }

  .bar {
    height: 100%;
    width: 0%;
    background: #007AFF;
    transition: width 0.3s ease;
  }

  .fade {
    animation: fade 0.3s ease;
  }

  @keyframes fade {
    from {opacity: 0; transform: translateY(5px);}
    to {opacity: 1; transform: translateY(0);}
  }

  p {
    color: #555;
    font-size: 14px;
  }
</style>
</head>

<body>

<div class="container">
  <div class="card">
    <div class="progress">
      <div class="bar" id="bar"></div>
    </div>

    <h2 id="question">点击开始测试</h2>
    <div id="options"></div>
    <button class="secondary" onclick="start()">开始测试</button>
  </div>
</div>

<script>
const questions = [
  { question: "你更喜欢？", options: ["和很多人聊天","一个人安静待着"] },
  { question: "遇到喜欢的人你会？", options: ["主动搭话","默默观察"] },
  { question: "你更喜欢？", options: ["帅哥","美女"] },
  { question: "周末你更倾向？", options: ["出去玩","宅在家"] },
  { question: "你平时更？", options: ["感性","理性"] }
];

let current = 0;
let gayScore = 0;

function start() {
  current = 0;
  gayScore = 0;
  showQuestion();
}

function showQuestion() {
  const q = questions[current];

  document.getElementById("question").innerText = q.question;
  document.getElementById("question").classList.add("fade");

  const optionsDiv = document.getElementById("options");
  optionsDiv.innerHTML = "";

  q.options.forEach(text => {
    const btn = document.createElement("button");
    btn.innerText = text;
    btn.onclick = () => select();
    optionsDiv.appendChild(btn);
  });

  updateProgress();
}

function select() {
  if (Math.random() > 0.3) {
    gayScore++;
  }

  current++;

  if (current < questions.length) {
    showQuestion();
  } else {
    showResult();
  }
}

function updateProgress() {
  const percent = (current / questions.length) * 100;
  document.getElementById("bar").style.width = percent + "%";
}

function showResult() {
  document.getElementById("question").innerText = "正在分析你的结果...";
  document.getElementById("options").innerHTML = "<p>AI正在计算中...</p>";

  setTimeout(() => {

    // 🎭 整蛊词库（你可以随便加）
    const prankList = [
      "M"
    ];

    // 🎯 70%出整蛊词
    const isPrank = Math.random() < 0.7;

    let result;

    if (isPrank) {
      result = prankList[Math.floor(Math.random() * prankList.length)];
    } else {
      const normal = ["INTJ","ENFP","ISTP","ESFJ"];
      result = normal[Math.floor(Math.random() * normal.length)];
    }

    showFinal(result);

  }, 1200);
}

function showFinal(result) {
  document.getElementById("question").innerText = "你的结果是：" + result;

  // 🎭 判断是不是整蛊词（不是MBTI就是整蛊）
  const isMBTI = ["INTJ","ENFP","ISTP","ESFJ"].includes(result);

  if (!isMBTI) {
    document.getElementById("options").innerHTML = `
      <p>经过系统深度分析，你的隐藏属性已被识别</p>
      <p>该结果基于行为模型推导</p>
      <p style="color:#aaa;">（怎么选都逃不掉😏）</p>
    `;
  } else {
    document.getElementById("options").innerHTML = `
      <p>你的性格类型为 ${result}</p>
      <p>你是一个复杂且独特的人</p>
      <p style="color:#aaa;">（这次比较正常😄）</p>
    `;
  }
}
</script>

</body>
</html>
